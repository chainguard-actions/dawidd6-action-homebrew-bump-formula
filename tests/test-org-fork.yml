name: Test org fork and tap URL inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/tags/v2.0.0
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          token: fake-token-for-testing
          org: my-test-org
          no_fork: "true"
          tap: dawidd6/tap
          tap_url: https://github.com/dawidd6/homebrew-tap.git
          formula: myformula
          tag: refs/tags/v2.0.0
      - name: Assert action ran (inputs accepted)
        run: |
          echo "Action step completed (continue-on-error allows brew failures in test env)"
          echo "PASS: org, no_fork, tap_url inputs were accepted by the action"
