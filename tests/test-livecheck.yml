name: Test livecheck mode with optional inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          token: fake-token-for-input-coverage
          tap: dawidd6/homebrew-tap
          tap_url: https://github.com/dawidd6/homebrew-tap.git
          formula: lazygit, lazydocker
          message: "Automated bump via CI"
          org: my-org
          no_fork: "true"
          force: "true"
          livecheck: "true"
      - name: Assert action ran (inputs accepted)
        run: |
          echo "Action completed (with or without error due to fake token)"
          echo "PASS: all optional inputs were accepted by the action"
