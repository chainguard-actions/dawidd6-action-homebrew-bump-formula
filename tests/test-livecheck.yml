name: Test livecheck mode inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          token: fake-token-for-testing
          tap: homebrew/core
          formula: "wget, curl"
          livecheck: "true"
      - name: Assert action ran (inputs accepted)
        run: |
          echo "Action step completed (continue-on-error allows brew failures in test env)"
          echo "PASS: livecheck inputs were accepted by the action"
