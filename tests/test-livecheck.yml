name: Test livecheck mode
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify Homebrew is available
        run: |
          echo /home/linuxbrew/.linuxbrew/bin >> $GITHUB_PATH

      - name: Check brew is installed
        run: |
          export PATH="/home/linuxbrew/.linuxbrew/bin:$PATH"
          if ! command -v brew &>/dev/null; then
            echo "SKIP: brew not available in this environment"
            exit 0
          fi
          echo "brew found: $(brew --version)"
          echo "PASS"

      - id: action
        uses: .
        continue-on-error: true
        env:
          GITHUB_REF: refs/tags/v1.0.0
          GITHUB_EVENT_NAME: push
        with:
          token: fake-token-for-testing
          tap: homebrew/core
          formula: wget
          livecheck: "true"

      - name: Assert action ran (may fail due to invalid token but should not crash unexpectedly)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          # The action is expected to fail with an invalid token,
          # but it should not produce an unexpected crash (e.g. missing brew binary).
          # We accept both 'success' and 'failure' as valid outcomes here.
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action ran and produced a defined outcome"
          else
            echo "FAIL: unexpected outcome '$OUTCOME'"
            exit 1
          fi
