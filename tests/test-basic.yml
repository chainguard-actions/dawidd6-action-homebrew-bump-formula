name: Test basic formula bump inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/tags/v1.0.0
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          token: fake-token-for-testing
          user_name: test-user
          user_email: test-user@example.com
          message: "Bump formula to new version"
          formula: wget
          tap: homebrew/core
          force: "true"
          tag: refs/tags/v1.0.0
          revision: abc1234def5678901234567890abcdef12345678
      - name: Assert action ran (inputs accepted)
        run: |
          echo "Action step completed (continue-on-error allows brew failures in test env)"
          echo "PASS: all basic inputs were accepted by the action"
