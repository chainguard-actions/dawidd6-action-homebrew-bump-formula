name: Test basic usage - bump formula
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          token: fake-token-for-input-coverage
          user_name: Test User
          user_email: test@example.com
          tap: dawidd6/homebrew-tap
          formula: lazygit
          tag: refs/tags/v1.0.0
          revision: 130d3a3af72f66780ae4e24cd143ae7a4d757f9d
      - name: Assert action ran (inputs accepted)
        run: |
          echo "Action completed (with or without error due to fake token)"
          echo "PASS: all inputs were accepted by the action"
